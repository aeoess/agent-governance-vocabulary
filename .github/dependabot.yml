version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Only the codeql-action family is version-paired; grouping everything
      # couples unrelated updates (hostile-review finding 6, 2026-07-17).
      codeql-action:
        patterns:
          - "github/codeql-action*"
