name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run validate

  # Trusted oracle (hostile-review finding 2, 2026-07-17): a PR can edit the
  # validator it is checked by, so this job runs the BASE branch's validator,
  # with dependencies installed from the base lockfile and lifecycle scripts
  # disabled, against the PR's data tree. This is the required context.
  validate-trusted:
    name: validate-trusted
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          path: pr-data
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.base_ref }}
          path: trusted
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts
        working-directory: trusted
      - run: node trusted/scripts/validate-crosswalks.js "$GITHUB_WORKSPACE/pr-data"
